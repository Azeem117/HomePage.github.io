  <body class="is-pc is-serp">

    <script>
      // Search engine URLs configuration
      const searchEngines = {
        brave: "https://search.brave.com/search?q=",
        google: "https://www.google.com/search?q=",
        duckduckgo: "https://duckduckgo.com/?q=",
        bing: "https://www.bing.com/search?q=",
        yahoo: "https://search.yahoo.com/search?p=",
        startpage: "https://www.startpage.com/do/search?q=",
      };

      // Get elements
      const searchForm = document.getElementById("searchform");
      const searchBox = document.getElementById("searchbox");
      const clearButton = document.getElementById("clear-query-button");
      const engineSelector = document.getElementById("search-engine");

      // Auto-resize textarea
      function autosize() {
        searchBox.style.height = "auto";
        searchBox.style.height = searchBox.scrollHeight + "px";
      }
      searchBox.addEventListener("input", autosize, false);
      autosize();

      // Clear button functionality
      clearButton.addEventListener("click", function () {
        searchBox.value = "";
        searchBox.focus();
        autosize();
      });

      // Handle form submission
      searchForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const query = searchBox.value.trim();
        if (!query) {
          searchBox.focus();
          return;
        }

        const selectedEngine = engineSelector.value;
        const searchUrl = searchEngines[selectedEngine];

        // Redirect to the selected search engine with the query
        window.location.href = searchUrl + encodeURIComponent(query);
      });

      // Handle Enter key in textarea
      searchBox.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          searchForm.dispatchEvent(new Event("submit"));
        }
      });

      // Save selected search engine to localStorage
      engineSelector.addEventListener("change", function () {
        localStorage.setItem("preferredSearchEngine", engineSelector.value);
      });

      // Load preferred search engine from localStorage
      const savedEngine = localStorage.getItem("preferredSearchEngine");
      if (savedEngine && searchEngines[savedEngine]) {
        engineSelector.value = savedEngine;
      }
    </script>
